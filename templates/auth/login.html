{% extends "base.html" %}

{% block title %}Login - TrekVoyage{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-5">
            <!-- Modern glassmorphism/card styling -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header with teal theme -->
                <div class="card-header bg-teal-custom text-white text-center py-4 border-0">
                    <i class="bi bi-compass fs-1 brand-icon"></i>
                    <h3 class="fw-bold mt-2 mb-0">Welcome Back</h3>
                    <p class="text-white-50 small mb-0">Sign in to your TrekVoyage account</p>
                </div>
                
                <!-- Body with input elements -->
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <!-- Email Field -->
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" required placeholder="name@example.com" autofocus>
                            </div>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required placeholder="••••••••">
                            </div>
                        </div>
                        
                        <!-- Remember me & Recover placeholder -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                            </div>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-orange-accent w-100 py-3 rounded-pill fw-semibold shadow-sm mb-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>
                    </form>
                    
                    <hr class="text-muted opacity-25">
                    
                    <div class="text-center">
                        <p class="text-muted mb-0 small">Don't have an account? 
                            <a href="{{ url_for('auth.register') }}" class="text-teal-custom fw-semibold text-decoration-none">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
