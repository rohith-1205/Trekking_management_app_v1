{% extends "base.html" %}

{% block title %}Register - TrekVoyage{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden my-4">
                <!-- Header with teal theme -->
                <div class="card-header bg-teal-custom text-white text-center py-4 border-0">
                    <i class="bi bi-person-plus fs-1 brand-icon"></i>
                    <h3 class="fw-bold mt-2 mb-0">Create Account</h3>
                    <p class="text-white-50 small mb-0">Join TrekVoyage as a Trekker or Guide</p>
                </div>
                
                <!-- Registration Form -->
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <!-- Name Field -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold text-secondary">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" required placeholder="John Doe">
                            </div>
                        </div>

                        <!-- Email Field -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" required placeholder="john@example.com">
                            </div>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required placeholder="Minimum 6 characters">
                            </div>
                        </div>

                        <!-- Contact Field -->
                        <div class="mb-3">
                            <label for="contact" class="form-label fw-semibold text-secondary">Contact Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                                <input type="tel" class="form-control border-start-0 ps-0" id="contact" name="contact" placeholder="10-digit number">
                            </div>
                        </div>

                        <!-- Role Field (Excluding Admin) -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Register As</label>
                            <div class="row g-3">
                                <!-- Trekker Option -->
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="role_user" value="user" checked>
                                    <label class="btn btn-outline-teal w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="role_user">
                                        <i class="bi bi-backpack-fill fs-3 mb-1"></i>
                                        <span class="fw-semibold">Trekker (User)</span>
                                        <small class="text-muted d-none d-sm-block">Instant approval</small>
                                    </label>
                                </div>
                                <!-- Guide Option -->
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="role_staff" value="staff">
                                    <label class="btn btn-outline-teal w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="role_staff">
                                        <i class="bi bi-compass-fill fs-3 mb-1"></i>
                                        <span class="fw-semibold">Guide (Staff)</span>
                                        <small class="text-muted d-none d-sm-block">Pending admin approval</small>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-orange-accent w-100 py-3 rounded-pill fw-semibold shadow-sm mb-3">
                            <i class="bi bi-person-plus me-1"></i> Create Account
                        </button>
                    </form>
                    
                    <hr class="text-muted opacity-25">
                    
                    <div class="text-center">
                        <p class="text-muted mb-0 small">Already have an account? 
                            <a href="{{ url_for('auth.login') }}" class="text-teal-custom fw-semibold text-decoration-none">Sign In here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
